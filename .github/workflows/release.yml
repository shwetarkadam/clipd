name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
          - runner: macos-13
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Build clipd-hud (Swift)
        run: |
          cd clipd-hud
          swiftc -O -o clipd-hud clipd-hud.swift -framework Cocoa
          cp -f clipd-hud ../target/release/clipd-hud
          chmod +x ../target/release/clipd-hud

      - name: Create Clipd.app bundle
        run: bash packaging/macos/create-app-bundle.sh

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - target/release/Clipd.app

      - name: Package zip (with .app + CLI)
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ZIP_NAME="Clipd-macos-${{ matrix.arch }}-${VERSION}"
          mkdir -p "target/release/${ZIP_NAME}"
          cp -R target/release/Clipd.app "target/release/${ZIP_NAME}/"
          cp -f target/release/clipd "target/release/${ZIP_NAME}/"
          chmod +x "target/release/${ZIP_NAME}/clipd"
          cp -f install.sh README.md "target/release/${ZIP_NAME}/" || true
          cd target/release && zip -qr "${ZIP_NAME}.zip" "${ZIP_NAME}/"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DMG_NAME="Clipd-macos-${{ matrix.arch }}-${VERSION}.dmg"
          brew install create-dmg 2>/dev/null || true
          create-dmg \
            --volname "Clipd ${VERSION}" \
            --volicon "packaging/icons/clipd.svg" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Clipd.app" 150 200 \
            --app-drop-link 450 200 \
            "target/release/${DMG_NAME}" \
            "target/release/Clipd.app" 2>/dev/null || \
          hdiutil create -volname "Clipd" \
            -srcfolder "target/release/Clipd.app" \
            -ov -format UDZO \
            "target/release/${DMG_NAME}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-macos-${{ matrix.arch }}-zip
          path: target/release/Clipd-macos-*.zip

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-macos-${{ matrix.arch }}-dmg
          path: target/release/Clipd-macos-*.dmg

  build-linux:
    strategy:
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            pkg-config \
            libxdo-dev \
            file \
            desktop-file-utils \
            libfuse2t64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Strip binaries
        run: |
          for bin in clipd clipd-ui clipd-gui clipd-mcp; do
            if [ -f "target/release/${bin}" ]; then
              strip "target/release/${bin}"
            fi
          done

      - name: Package zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ZIP_NAME="Clipd-linux-${{ matrix.arch }}-${VERSION}"
          mkdir -p "target/release/${ZIP_NAME}"
          for bin in clipd clipd-ui clipd-gui clipd-mcp; do
            if [ -f "target/release/${bin}" ]; then
              cp -f "target/release/${bin}" "target/release/${ZIP_NAME}/"
              chmod +x "target/release/${ZIP_NAME}/${bin}"
            fi
          done
          cp -f install.sh README.md "target/release/${ZIP_NAME}/" || true
          cp -f packaging/linux/clipd.desktop "target/release/${ZIP_NAME}/"
          cp -f packaging/linux/install-desktop.sh "target/release/${ZIP_NAME}/"
          cp -f packaging/icons/clipd.svg "target/release/${ZIP_NAME}/"
          chmod +x "target/release/${ZIP_NAME}/install-desktop.sh"
          cd target/release && zip -qr "${ZIP_NAME}.zip" "${ZIP_NAME}/"

      - name: Build .deb package
        run: bash packaging/linux/create-deb.sh "${GITHUB_REF_NAME}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-linux-${{ matrix.arch }}-zip
          path: target/release/Clipd-linux-*.zip

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-linux-${{ matrix.arch }}-deb
          path: target/release/clipd_*.deb

  build-windows:
    strategy:
      matrix:
        include:
          - runner: windows-latest
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package zip
        shell: pwsh
        run: |
          $Version = "${env:GITHUB_REF_NAME}"
          $ZipName = "Clipd-windows-${{ matrix.arch }}-${Version}"
          $Dir = "target/release/${ZipName}"
          New-Item -ItemType Directory -Path $Dir -Force
          foreach ($bin in @("clipd.exe", "clipd-ui.exe", "clipd-gui.exe", "clipd-mcp.exe")) {
            $src = "target/release/$bin"
            if (Test-Path $src) { Copy-Item $src $Dir }
          }
          Copy-Item packaging/windows/Clipd.bat $Dir -ErrorAction SilentlyContinue
          Copy-Item packaging/windows/ClipdTray.vbs $Dir -ErrorAction SilentlyContinue
          Copy-Item packaging/windows/ClipdDebug.bat $Dir -ErrorAction SilentlyContinue
          Copy-Item install.ps1, README.md $Dir -ErrorAction SilentlyContinue
          Compress-Archive -Path $Dir -DestinationPath "target/release/${ZipName}.zip"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-windows-${{ matrix.arch }}-zip
          path: target/release/Clipd-windows-*.zip

  create-release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip
