name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Telemetry endpoint — set in GitHub repo Settings → Secrets → Actions as CLIPD_TELEMETRY_ENDPOINT.
# Format: https://your-worker.workers.dev (no trailing slash).
# If unset or empty, telemetry is compiled out (zero binary cost, zero network calls).
env:
  CLIPD_TELEMETRY_ENDPOINT: ${{ secrets.CLIPD_TELEMETRY_ENDPOINT }}

jobs:
  build-macos:
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel (macos-13) removed: GitHub retired those runners, so the job
          # queued forever and blocked create-release (timeout-minutes only
          # counts once a job *starts*). Intel support can return later via
          # cross-compilation (x86_64-apple-darwin) on the arm64 runner.
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Build clipd-hud (Swift)
        run: |
          cd clipd-hud
          swiftc -O -o clipd-hud clipd-hud.swift -framework Cocoa
          cp -f clipd-hud ../target/release/clipd-hud
          chmod +x ../target/release/clipd-hud

      - name: Build clipd-ocr (Swift — Apple Vision OCR)
        run: |
          cd clipd-ocr
          swiftc -O -o clipd-ocr clipd-ocr.swift -framework Vision -framework AppKit
          cp -f clipd-ocr ../target/release/clipd-ocr
          chmod +x ../target/release/clipd-ocr

      # Import the self-signed "clipd-codesign" cert so every release shares one
      # stable identity. Without this, ad-hoc signing changes the signature hash
      # on each build and macOS silently drops Input Monitoring / Accessibility
      # grants — breaking multi-slot copy + HUD after every update.
      - name: Import signing certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "::warning::MACOS_CERT_P12 secret not set — falling back to ad-hoc signing (TCC grants will NOT persist)."
            echo "CLIPD_SIGN_ID=-" >> "$GITHUB_ENV"
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/clipd-signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/clipd-cert.p12"
          echo "$MACOS_CERT_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$CERT_PATH"
          echo "CLIPD_SIGN_ID=clipd-codesign" >> "$GITHUB_ENV"
          echo "Imported clipd-codesign signing identity."

      - name: Create Clipd.app bundle
        run: bash packaging/macos/create-app-bundle.sh

      - name: Code sign Clipd.app
        run: codesign --force --deep --sign "${CLIPD_SIGN_ID:--}" target/release/Clipd.app

      - name: Package zip (with .app + CLI)
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ZIP_NAME="Clipd-macos-${{ matrix.arch }}-${VERSION}"
          mkdir -p "target/release/${ZIP_NAME}"
          cp -R target/release/Clipd.app "target/release/${ZIP_NAME}/"
          cp -f target/release/clipd "target/release/${ZIP_NAME}/"
          chmod +x "target/release/${ZIP_NAME}/clipd"
          cp -f install.sh README.md "target/release/${ZIP_NAME}/" || true
          cd target/release && zip -qr "${ZIP_NAME}.zip" "${ZIP_NAME}/"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME}"
          DMG_NAME="Clipd-macos-${{ matrix.arch }}-${VERSION}.dmg"
          hdiutil create -volname "Clipd" \
            -srcfolder "target/release/Clipd.app" \
            -ov -format UDZO \
            "target/release/${DMG_NAME}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-macos-${{ matrix.arch }}-zip
          path: target/release/Clipd-macos-*.zip

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-macos-${{ matrix.arch }}-dmg
          path: target/release/Clipd-macos-*.dmg

  build-linux:
    timeout-minutes: 40
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            pkg-config \
            libxdo-dev \
            file \
            desktop-file-utils

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Strip binaries
        run: |
          for bin in clipd clipd-ui clipd-gui clipd-mcp; do
            if [ -f "target/release/${bin}" ]; then
              strip "target/release/${bin}"
            fi
          done

      - name: Package zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ZIP_NAME="Clipd-linux-x86_64-${VERSION}"
          mkdir -p "target/release/${ZIP_NAME}"
          for bin in clipd clipd-ui clipd-gui clipd-mcp; do
            if [ -f "target/release/${bin}" ]; then
              cp -f "target/release/${bin}" "target/release/${ZIP_NAME}/"
              chmod +x "target/release/${ZIP_NAME}/${bin}"
            fi
          done
          cp -f install.sh README.md "target/release/${ZIP_NAME}/" || true
          cp -f packaging/linux/clipd.desktop "target/release/${ZIP_NAME}/"
          cp -f packaging/linux/install-desktop.sh "target/release/${ZIP_NAME}/"
          cp -f packaging/icons/clipd.svg "target/release/${ZIP_NAME}/"
          chmod +x "target/release/${ZIP_NAME}/install-desktop.sh"
          cd target/release && zip -qr "${ZIP_NAME}.zip" "${ZIP_NAME}/"

      - name: Build .deb package
        run: bash packaging/linux/create-deb.sh "${GITHUB_REF_NAME}"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-linux-x86_64-zip
          path: target/release/Clipd-linux-*.zip

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-linux-x86_64-deb
          path: target/release/clipd_*.deb

  build-windows:
    timeout-minutes: 40
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package zip
        shell: pwsh
        run: |
          $Version = "${env:GITHUB_REF_NAME}"
          $ZipName = "Clipd-windows-x86_64-${Version}"
          $Dir = "target/release/${ZipName}"
          New-Item -ItemType Directory -Path $Dir -Force
          foreach ($bin in @("clipd.exe", "clipd-ui.exe", "clipd-gui.exe", "clipd-overlay.exe", "clipd-picker.exe", "clipd-mcp.exe")) {
            $src = "target/release/$bin"
            if (Test-Path $src) { Copy-Item $src $Dir }
          }
          Copy-Item packaging/windows/Clipd.bat $Dir -ErrorAction SilentlyContinue
          Copy-Item packaging/windows/ClipdTray.vbs $Dir -ErrorAction SilentlyContinue
          Copy-Item packaging/windows/ClipdDebug.bat $Dir -ErrorAction SilentlyContinue
          Copy-Item install.ps1, README.md $Dir -ErrorAction SilentlyContinue
          Compress-Archive -Path $Dir -DestinationPath "target/release/${ZipName}.zip"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipd-windows-x86_64-zip
          path: target/release/Clipd-windows-*.zip

  create-release:
    needs: [build-macos, build-linux, build-windows]
    # Publish whatever built — don't let one stuck/failed platform (e.g. a hung
    # macOS Intel runner) block releasing the Windows/Linux/arm64 artifacts.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip, artifacts/*.dmg, artifacts/*.deb
